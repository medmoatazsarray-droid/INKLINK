<div class="auth-page position-relative overflow-hidden">
    <div class="container-fluid px-4 px-lg-5 py-3 d-flex flex-column position-relative auth-content min-vh-100">
        <div class="d-flex justify-content-center justify-content-lg-start">
            <img
                src="assets/icons/logo final-02.png"
                alt="logo"
                class="logo-img img-fluid"
                (click)="goHome()"
                style="cursor: pointer;"
            />
        </div>

        <div class="flex-grow-1 d-flex align-items-start justify-content-center">
            <div class="auth-card w-100">
                <h2 class="auth-title text-center mb-4">Sign In</h2>

                <div class="auth-form w-100">
                    <div class="row g-2 g-sm-3 g-md-4 mb-3 mb-md-4">
                        <div class="col-12 col-sm-6">
                            <div class="form-group">
                                <label class="form-label">First name</label>
                                <input
                                    type="text"
                                    class="form-control ink-input"
                                    placeholder="Your name"
                                    [(ngModel)]="firstName"
                                    [class.is-invalid]="firstNameError"
                                />
                                <div class="invalid-feedback d-block" *ngIf="firstNameError">{{ firstNameError }}</div>
                            </div>
                        </div>
                        <div class="col-12 col-sm-6">
                            <div class="form-group">
                                <label class="form-label">Second name</label>
                                <input
                                    type="text"
                                    class="form-control ink-input"
                                    placeholder="Your name"
                                    [(ngModel)]="lastName"
                                    [class.is-invalid]="lastNameError"
                                />
                                <div class="invalid-feedback d-block" *ngIf="lastNameError">{{ lastNameError }}</div>
                            </div>
                        </div>
                    </div>

                    <div class="form-group mb-3 mb-md-4">
                        <label class="form-label">Email</label>
                        <input
                            type="email"
                            class="form-control ink-input"
                            placeholder="votre@email.com"
                            [(ngModel)]="email"
                            [class.is-invalid]="emailError"
                        />
                        <div class="invalid-feedback d-block" *ngIf="emailError">{{ emailError }}</div>
                    </div>

                    <div class="form-group mb-4 mb-md-5">
                        <label class="form-label">Password</label>
                        <div class="input-password-wrap">
                            <input
                                [type]="showPassword ? 'text' : 'password'"
                                class="form-control ink-input"
                                placeholder="8charachters required"
                                [(ngModel)]="password"
                                [class.is-invalid]="passwordError"
                            />
                            <button class="toggle-password" type="button" (click)="togglePassword()">
                                <img src="assets/icons/preview.svg" alt="eye" class="eye-img" />
                            </button>
                        </div>
                        <div class="invalid-feedback d-block" *ngIf="passwordError">{{ passwordError }}</div>
                    </div>

                    <div class="text-center mb-3">
                        <button class="btn btn-danger ink-submit" type="button" (click)="onRegister()" [disabled]="isLoading">
                            {{ isLoading ? 'Loading...' : 'Sign in' }}
                        </button>
                    </div>

                    <div class="social-section">
                        <p class="social-label mb-3">Sign in with</p>
                        <div class="social-icons">
                            <button class="social-btn social-btn--facebook" type="button" (click)="loginWith('facebook')">
                                <img src="assets/icons/facebook.svg" alt="facebook" class="facebook-img" />
                            </button>
                            <button class="social-btn social-btn--google" type="button" (click)="loginWith('google')">
                                <img src="assets/icons/mail icon.svg" alt="mail" class="mail-img" />
                            </button>
                            <button class="social-btn social-btn--apple" type="button" (click)="loginWith('apple')">
                                <img src="assets/icons/apple.svg" alt="apple" class="apple-img" />
                            </button>
                        </div>
                    </div>
                    <div class="sub-link">
                        <p class="sub-label mb-3">Already have an account? <a routerLink="/login">Log in</a></p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="corner-decoration" aria-hidden="true"></div>
</div>
