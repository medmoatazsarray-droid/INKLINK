<nav class="navbar-wrapper" [class.transparent-nav]="isTransparent" [class.floating-nav]="isFloating">
    <div class="container d-flex align-items-center justify-content-between">
        <div class="nav-logo" routerLink="/" style="cursor: pointer;">
            <img [src]="currentLogo" alt="Logo" height="55">
        </div>
        <div class="nav-links-pill">
            <div class="nav-dropdown-wrapper">
                <a class="nav-link-item" (click)="toggleCategory($event)">Category</a>
                <div class="nav-dropdown" *ngIf="categoryOpen">
                    <a href="#" class="nav-dropdown-item" (click)="categoryOpen = false">Events</a>
                    <a routerLink="/marketing-support" class="nav-dropdown-item" (click)="categoryOpen = false">Marketing support</a>
                    <a href="#" class="nav-dropdown-item" (click)="categoryOpen = false">Personal products</a>
                    <a routerLink="/outfit" class="nav-dropdown-item" (click)="categoryOpen = false">Outfit</a>
                </div>
            </div>
            <a href="#" class="nav-link-item">Other Services</a>
            <a href="#" class="nav-link-item">About Us</a>
        </div>
        <div class="nav-right d-flex align-items-center gap-3">
            <button class="btn-signin" routerLink="/sign-in" *ngIf="!isLoggedIn">Sign in</button>
            
            <div class="user-avatar" *ngIf="isLoggedIn" title="Logged in">
                {{ initials }}
            </div>

            <img src="assets/icons/login icon.svg" alt="login icon" class="nav-icon" *ngIf="!isLoggedIn">
            <img src="assets/icons/shop icon.svg" alt="shop icon" class="nav-icon">
            
            <!-- Settings Dropdown -->
            <div class="nav-dropdown-wrapper" *ngIf="isLoggedIn">
                <img src="assets/icons/settings icon.svg" alt="settings icon" class="nav-icon" (click)="toggleSettings($event)">
                <div class="nav-dropdown" *ngIf="settingsOpen" style="right: 0; left: auto; transform: none;">
                    <a class="nav-dropdown-item" (click)="logout()">Sign out</a>
                </div>
            </div>
            <img src="assets/icons/settings icon.svg" alt="settings icon" class="nav-icon" *ngIf="!isLoggedIn">
        </div>
    </div>
</nav>
