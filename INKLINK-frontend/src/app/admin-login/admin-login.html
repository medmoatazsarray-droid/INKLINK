<div class="d-flex justify-content-center align-items-center vh-100">
    <div class="card p-4 shadow" style="width : 350px;">
        <h3 class="text-center mb-4">Admin Login</h3>
        <form (ngSubmit)="onSubmit()">
            <div class="mb-3">
                <label for="username" class="form-label">Username or email</label>
                <input type="text" id="username" class="form-control" [(ngModel)]="username" name="username" required>
            </div>
            <div class="mb-3">
                <label for="password" class="form-label">Password</label>
                <input [type]="showPassword ? 'text' : 'password'" id="password" class="form-control" [(ngModel)]="password" name="password" required>
                <div class="form-check mt-2">
                    <input id="showLoginPassword" class="form-check-input" type="checkbox" [(ngModel)]="showPassword" name="showLoginPassword">
                    <label for="showLoginPassword" class="form-check-label">Show password</label>
                </div>
            </div>
            <button type="submit" class="btn btn-primary w-100">Login</button>
            <a routerLink="/admin/forgot-password" class="text-decoration-none">Forgot Password?</a>
        </form>
    </div>
</div>
