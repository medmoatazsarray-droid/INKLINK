<div class="container mt-5" style="max-width: 500px;">
    <h3 class="mb-4 text-center">Mot de passe oublié</h3>
    
    <!-- Success Message -->
    <div *ngIf="successMessage" class="alert alert-success alert-dismissible fade show" role="alert">
        <div class="mb-2">
            <strong>✓ Succès!</strong>
            <p class="mb-0">{{ successMessage }}</p>
        </div>
        <div *ngIf="previewUrl" class="mt-3">
            <p class="mb-2 text-muted">Ouvrez le lien ci-dessous pour voir votre email:</p>
            <a [href]="previewUrl" target="_blank" class="btn btn-sm btn-outline-primary w-100">
                📧 Voir mon email
            </a>
        </div>
    </div>

    <!-- Error Message -->
    <div *ngIf="errorMessage" class="alert alert-danger alert-dismissible fade show" role="alert">
        {{ errorMessage }}
    </div>

    <!-- Form -->
    <form (ngSubmit)="onSubmit()" *ngIf="!successMessage">
        <div class="mb-3">
            <label for="email" class="form-label">Adresse e-mail</label>
            <input type="email" id="email" class="form-control" [(ngModel)]="email" name="email" required>
        </div>
        <button type="submit" class="btn btn-primary w-100" [disabled]="isLoading">
            <span *ngIf="!isLoading">Envoyer</span>
            <span *ngIf="isLoading">Envoi en cours...</span>
        </button>
    </form>

    <!-- Back Link -->
    <div class="text-center mt-3">
        <a routerLink="/admin" class="text-decoration-none">Retour à la connexion</a>
    </div>
</div>
