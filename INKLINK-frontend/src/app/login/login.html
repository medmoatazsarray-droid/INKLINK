<div class="auth-page position-relative overflow-hidden d-flex">
    <div class="sidebar-left flex-shrink-0">
        <div class="sidebar-content">
            <img
                src="assets/icons/rec.svg"
                alt="logo"
                class="sidebar-logo"
                (click)="goHome()"
                style="cursor: pointer;"
            />
        </div>
    </div>

    <div class="auth-right flex-grow-1">
        <div class="container-fluid px-2 px-sm-3 px-md-4 px-lg-5 py-3 d-flex flex-column position-relative auth-content min-vh-100">
            <div class="text-center mb-5">
                <img
                    src="assets/icons/logo final-02.png"
                    alt="InKLINK"
                    class="header-logo"
                    (click)="goHome()"
                    style="cursor: pointer;"
                />
            </div>

            <div class="flex-grow-1 d-flex align-items-start justify-content-center">
                <div class="auth-card w-100">
                <h2 class="auth-title text-center mb-3">Welcome back</h2>

                <div class="auth-form w-100">
                    <div class="form-group">
                        <label class="form-label">Email</label>
                        <input
                            type="email"
                            class="form-control ink-input"
                            placeholder="your@email.com"
                            [(ngModel)]="email"
                            [class.is-invalid]="emailError"
                        />
                        <div class="invalid-feedback d-block" *ngIf="emailError">{{ emailError }}</div>
                    </div>

                    <div class="form-group mt-3">
                        <label class="form-label">Password</label>
                        <div class="input-password-wrap">
                            <input
                                [type]="showPassword ? 'text' : 'password'"
                                class="form-control ink-input"
                                placeholder="8 characters required"
                                [(ngModel)]="password"
                                [class.is-invalid]="passwordError"
                            />
                            <button class="toggle-password" type="button" (click)="togglePassword()">
                                <img src="assets/icons/preview.svg" alt="eye" class="eye-img" />
                            </button>
                        </div>
                        <div class="invalid-feedback d-block" *ngIf="passwordError">{{ passwordError }}</div>
                    </div>

                    <div class="mt-4 text-center">
                        <button class="btn btn-danger ink-submit" type="button" (click)="onLogin()" [disabled]="isLoading">
                            {{ isLoading ? 'Loading...' : 'Sign in' }}
                        </button>
                    </div>

                    <div class="mt-3 text-center">
                        <a routerLink="/forgot-password" class="forgot-link">Forgot your password?</a>
                    </div>

                    <div class="invalid-feedback d-block text-center mt-2" *ngIf="generalError">{{ generalError }}</div>

                    <div class="signin-link text-center mt-3">
                        <span class="link-sub">Don't have an account yet? <a routerLink="/register" class="forgot-link">Sign up</a></span>
                    </div>
                </div>
            </div>
        </div>
    </div>

</div>
