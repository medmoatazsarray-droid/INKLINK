<div class="login-page">
    <div class="login-card">
        <div class="login-logo">
            <img src="assets/icons/logo final-02.png" alt="logo" class="logo-img" />    
        </div>
        <h2 class="login-title">Welcome back</h2>
        <div class="login-form">
            <div class="form-group">
                <label class="form-label email-label">Email</label>
                <input class="form-input" placeholder="your@email.com" [(ngModel)]="email" [class.input.error]="emailError" />
                <span class="error-msg" *ngIf="emailError">{{ emailError }}</span>
            </div>
            <div class="form-group">
                <label class="form-label password-label">Password</label>
                <div class="input-password-wrap">
                    <input [type]="showPassword ?'text' : 'password'" class="form-input" placeholder="8 character required" [(ngModel)]="password" [class.input-error]="passwordError" />
                    <button class="toggle-password" type="button" (click)="togglePassword()">
                        <img src="assets/icons/eye.svg" alt="eye" />
                    </button>
                </div>
                <span class="error-msg" *ngIf="passwordError">{{ passwordError }}</span>
            </div>
            <div class="logo-links">
                <a href="#" class="link-text">Forgot your password</a>
                <a href="/register" class="link-text">Don't have an account yet ? Sign up</a>
            </div>
            <button class="btn-login w-100" (click)="onLogin()" [disabled]="isLoading">
                <span *ngIf="!isLoading">Login</span>
                <span *ngIf="isLoading" class="spinner-border spinner-border-sm" role="status"></span>
            </button>
            </div>
        </div>
        <div class="corner-decoration"></div>
    </div>
</div>
