<section class="edit-profile-section py-5">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-12 col-lg-8">
                <div class="edit-card shadow-lg p-4 p-md-5">
                    <div class="d-flex align-items-center justify-content-between mb-4">
                        <h2 class="edit-title mb-0">Edit Profile</h2>
                        <button class="btn-close-custom" (click)="cancel()">
                            <i class="bi bi-x-lg"></i>
                        </button>
                    </div>

                    <div *ngIf="successMessage" class="alert alert-success">{{ successMessage }}</div>
                    <div *ngIf="errorMessage" class="alert alert-danger">{{ errorMessage }}</div>

                    <form (ngSubmit)="onSubmit()" #profileForm="ngForm">
                        <!-- Avatar Upload -->
                        <div class="avatar-upload-section text-center mb-5">
                            <div class="avatar-preview-container mx-auto position-relative">
                                <img [src]="imagePreview || 'assets/icons/profile_placeholder.svg'" alt="Profile Preview" class="avatar-preview-img" />
                                <label for="avatarInput" class="avatar-edit-badge">
                                    <img src="assets/icons/edit_icon.svg" alt="edit" width="20" />
                                    <input type="file" id="avatarInput" (change)="onFileSelected($event)" accept="image/*" class="d-none" />
                                </label>
                            </div>
                            <p class="mt-3 text-muted small">Tap to change profile picture</p>
                        </div>

                        <!-- Form Grid -->
                        <div class="row g-4">
                            <div class="col-12 col-md-6">
                                <div class="form-group">
                                    <label class="form-label">First Name</label>
                                    <input type="text" name="prenom" [(ngModel)]="user.prenom" class="form-control ink-input" required />
                                </div>
                            </div>
                            <div class="col-12 col-md-6">
                                <div class="form-group">
                                    <label class="form-label">Last Name</label>
                                    <input type="text" name="nom" [(ngModel)]="user.nom" class="form-control ink-input" required />
                                </div>
                            </div>
                            <div class="col-12">
                                <div class="form-group">
                                    <label class="form-label">Email Address</label>
                                    <input type="email" name="email" [(ngModel)]="user.email" class="form-control ink-input" required />
                                </div>
                            </div>
                            <div class="col-12 col-md-6">
                                <div class="form-group">
                                    <label class="form-label">Phone Number</label>
                                    <input type="text" name="telephone" [(ngModel)]="user.telephone" class="form-control ink-input" placeholder="00.000.000" />
                                </div>
                            </div>
                            <div class="col-12 col-md-6">
                                <div class="form-group">
                                    <label class="form-label">Postal Code</label>
                                    <input type="text" name="codePostal" [(ngModel)]="user.codePostal" class="form-control ink-input" placeholder="1234" />
                                </div>
                            </div>
                            <div class="col-12">
                                <div class="form-group">
                                    <label class="form-label">Location (City)</label>
                                    <input type="text" name="location" [(ngModel)]="user.location" class="form-control ink-input" placeholder="Sfax 3000" />
                                </div>
                            </div>
                            <div class="col-12">
                                <div class="form-group">
                                    <label class="form-label">Full Address</label>
                                    <textarea name="adresse" [(ngModel)]="user.adresse" class="form-control ink-input h-auto" rows="3" placeholder="123 Rue El Menzah, Sfax"></textarea>
                                </div>
                            </div>
                        </div>

                        <!-- Actions -->
                        <div class="d-flex flex-column flex-md-row gap-3 mt-5">
                            <button type="submit" class="btn btn-save-profile w-100" [disabled]="isLoading">
                                <span *ngIf="!isLoading">Save Changes</span>
                                <span *ngIf="isLoading" class="spinner-border spinner-border-sm me-2"></span>
                                <span *ngIf="isLoading">Saving...</span>
                            </button>
                            <button type="button" class="btn btn-cancel-profile w-100" (click)="cancel()">
                                Cancel
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</section>
