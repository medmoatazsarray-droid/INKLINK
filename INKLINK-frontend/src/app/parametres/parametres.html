<div class="admin-dashboard">
  <app-siderbar [adminName]="adminName"></app-siderbar>

  <section class="dashboard-panel">
    <div class="topbar-header">
      <div class="search-container">
        <input type="text" placeholder="Recherche par ID ou client ...">
        <img src="/assets/icons/Vector.svg" alt="Recherche" class="search-icon-svg" />
      </div>
      <div class="top-date-display">{{ currentDate }}</div>
    </div>

    <h1 class="greeting">Bonjour {{ adminName }}</h1>

    <div class="form-card">
      <div class="card-header-row d-flex align-items-center gap-3">
        <div class="profile-image-container">
          <div class="profil-avatar">
            @if (selectedAvatarUrl) {
              <img [src]="selectedAvatarUrl" alt="Avatar" class="avatar-img">
            } @else {
              {{ adminInitial }}
            }
          </div>
          <button type="button" class="btn btn-changer" (click)="toggleAvatarPicker()">Changer</button>

          <!-- Avatar Picker Modal -->
          <div class="avatar-picker-backdrop" *ngIf="showAvatarPicker" (click)="toggleAvatarPicker()">
            <div class="avatar-picker-card" (click)="$event.stopPropagation()">
              <div class="picker-header">
                <h6>Choisir une photo de profil</h6>
                <button class="close-picker" type="button" (click)="toggleAvatarPicker()">✕</button>
              </div>
              <div class="avatars-grid">
                <div class="avatar-item" *ngFor="let avatar of avatars" (click)="selectAvatar(avatar)">
                  <img [src]="avatar" alt="Avatar option">
                </div>
              </div>
            </div>
          </div>
        </div>
        <h5 class="form-title m-0">Paramètres du compte</h5>
      </div>

      <div class="form-body mt-4">
        <div class="mb-3">
          <label for="username" class="form-label">Nom d'utilisateur</label>
          <input type="text" class="form-control" id="username" [(ngModel)]="adminName">
        </div>
        <div class="mb-3">
          <label for="email" class="form-label">Email</label>
          <input type="email" class="form-control" id="email" [(ngModel)]="email">
        </div>
        <div class="mb-3">
          <label for="password" class="form-label">Mot de passe</label>
          <input type="password" class="form-control" id="password" [(ngModel)]="password">
        </div>
        <div class="mb-3">
          <label for="confirmPassword" class="form-label">Confirmer le mot de passe</label>
          <input type="password" class="form-control" id="confirmPassword" [(ngModel)]="confirmPassword">
        </div>
        <div class="d-flex justify-content-end mt-3">
          <button class="btn btn-outline-secondary me-2" (click)="resetForm()">Annuler</button>
          <button class="btn btn-primary" (click)="saveParametres()">Sauvegarder</button>
        </div>
      </div>
    </div>
  </section>
</div>
